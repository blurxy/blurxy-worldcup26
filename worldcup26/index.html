<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 — Match Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root{
    --ink:#0a1f14;--field:#0d5c34;--field-deep:#073d22;--paper:#fbfdf9;--card:#fff;
    --gold:#f5c542;--gold-deep:#d99e10;--live:#e23b3b;--muted:#5d6f63;--border:#d6e2d6;--chalk:#e8efe6;
  }
  :root{--surface:#fff;--line2:#e3ece2;--line3:#eef2ec;--muted2:#7a8c7f;--faint:#9aab9f;--tint:#f1f5ef;--tintg:#f1f7ef;--tinty:#fdf7e8;--shade:#f6faf4;--kobg:#fffdf4;--koline:#f0e3b8}
  html.dark{--paper:#0f1512;--card:#19231d;--surface:#19231d;--ink:#e9efe9;--muted:#9fb0a4;--muted2:#90a298;--faint:#728579;--border:#2c3b32;--line2:#26332b;--line3:#243029;--tint:#1f2a23;--tintg:#16271d;--tinty:#241f12;--shade:#16201a;--kobg:#201d12;--koline:#3a3320}
  html{background:var(--paper)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.4;padding-bottom:60px;-webkit-font-smoothing:antialiased}
  .inner{max-width:1180px;margin:0 auto;padding-left:clamp(16px,4.5vw,40px);padding-right:clamp(16px,4.5vw,40px)}

  .hero{background:linear-gradient(160deg,var(--field),var(--field-deep));color:#f4f7f2;position:relative;overflow:hidden;border-bottom:4px solid var(--gold)}
  .hero::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 46px,rgba(255,255,255,.04) 46px 92px);pointer-events:none}
  .hero-inner{padding-top:clamp(22px,5vw,34px);padding-bottom:clamp(18px,4vw,26px);position:relative}
  .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
  h1{font-weight:900;font-size:clamp(32px,7vw,60px);line-height:.92;letter-spacing:-.02em;text-transform:uppercase}
  h1 .yr{color:var(--gold)}
  .hero-sub{margin-top:11px;font-size:clamp(13px,1.6vw,15px);color:var(--chalk);font-family:'Archivo Narrow',sans-serif;letter-spacing:.02em}
  .hero-meta{display:flex;gap:clamp(20px,3.5vw,46px);margin-top:18px;flex-wrap:wrap}
  .hero-meta .num{font-size:clamp(20px,2.4vw,26px);font-weight:700;color:#fff;font-family:'DM Mono',monospace}
  .hero-meta .lbl{display:block;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:3px}

  .livebar{background:var(--field-deep);color:#fff}
  .livebar-inner{padding-top:9px;padding-bottom:9px;display:flex;align-items:center;gap:11px;font-family:'Archivo Narrow',sans-serif;font-size:13px}
  .dot{width:8px;height:8px;border-radius:50%;background:#7d8f82;flex:0 0 auto}
  .dot.on{background:var(--live);animation:pulse 1.4s infinite}
  .livebar .txt{flex:1;min-width:0;color:var(--chalk)}
  .livebar .txt b{color:#fff}
  .refresh{font-family:'Archivo',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;background:var(--gold);color:#3a2c00;border:none;border-radius:7px;padding:7px 14px;cursor:pointer;flex:0 0 auto;transition:.15s}
  .refresh:hover{background:#ffd757}
  .refresh:disabled{opacity:.6;cursor:default}
  .refresh.ghost{background:transparent;color:var(--gold);border:1px solid rgba(245,197,66,.5);padding:7px 12px}
  .refresh.ghost:hover{background:rgba(245,197,66,.12)}

  .controls{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(7,61,34,.05)}
  .controls-inner{padding-top:11px;padding-bottom:10px}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-family:'Archivo Narrow',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.03em;border-radius:999px;padding:6px 14px;white-space:nowrap;cursor:pointer;transition:.15s;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
  .chip.active{background:var(--field);color:#fff;border-color:var(--field)}
  .search{width:100%;margin-top:9px;font-family:'Archivo',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--ink);background:var(--surface)}
  .search::placeholder{color:var(--faint)}
  .search:focus{border-color:var(--field);outline:none}

  .wrap{padding-top:6px}
  .daygroup{margin-top:24px}
  .dayhead{display:flex;align-items:baseline;gap:10px;padding:0 2px 9px;border-bottom:2px solid var(--ink);margin-bottom:13px}
  .dnum{font-weight:900;font-size:26px;line-height:1}
  .dayhead.today .dnum{color:var(--live)}
  .dmon{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--field)}
  .todaytag{font-family:'Archivo',sans-serif;font-weight:800;font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:var(--live);color:#fff;padding:2px 7px;border-radius:5px}
  .dweek{margin-left:auto;font-family:'Archivo Narrow',sans-serif;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:10px}
  .match{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 14px;display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;transition:transform .14s ease,box-shadow .14s ease;cursor:pointer}
  .match:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(7,61,34,.10)}
  .match.knockout{background:linear-gradient(180deg,var(--kobg),#fff);border-color:var(--koline)}
  .match.done{background:var(--shade)}
  html.dark .match.knockout{background:var(--kobg)}
  .match.live{border-color:var(--live);box-shadow:0 0 0 1px var(--live),0 6px 16px rgba(226,59,59,.14)}
  .mtime{position:relative;text-align:center;padding-right:13px}
  .mtime::after{content:"";position:absolute;right:0;top:2px;bottom:2px;width:1px;background:var(--border)}
  .mtime .t{font-family:'DM Mono',monospace;font-weight:600;font-size:15px;line-height:1.1;white-space:nowrap;letter-spacing:-.02em}
  .mtime .tz{font-size:8.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;white-space:nowrap}
  .badge{display:inline-block;margin-top:5px;font-family:'Archivo',sans-serif;font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 5px;border-radius:4px}
  .badge.live{background:var(--live);color:#fff;animation:pulse 1.4s infinite}
  .badge.ft{background:var(--chalk);color:var(--muted)}
  .mteams{min-width:0}
  .mteams .row{display:flex;align-items:center;gap:9px;padding:1.5px 0}
  .flag{width:26px;height:18px;flex:0 0 auto;object-fit:cover;border-radius:3px;border:1px solid rgba(10,31,20,.12);background:#eef1ee}
  .flag.ph{border-style:dashed;border-color:#c9b87e;background:#f1ede2}
  .koR .konm{display:flex;flex-direction:column;min-width:0;line-height:1.12}
  .koR .konm .nmline{display:flex;align-items:baseline;min-width:0}
  .koR .konm .nm{font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slotcode{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold-deep);margin-top:1px}
  .projflag{box-shadow:0 0 0 1.5px var(--gold-deep)}
  .projpill{display:inline-block;font-family:'Archivo',sans-serif;font-weight:800;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#7a5800;background:#fbe6a8;border-radius:4px;padding:1.5px 5px;vertical-align:middle;margin-left:5px}
  .nm{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .row.win .nm{color:var(--field)}
  .row.lose .nm{color:var(--muted2);text-decoration:line-through;text-decoration-color:var(--faint);text-decoration-thickness:1.5px}
  .row.lose .flag{filter:saturate(.55) opacity(.7)}
  .sc{margin-left:auto;font-family:'DM Mono',monospace;font-weight:500;font-size:16px}
  .row.win .sc{color:var(--field);font-weight:600}
  .row.lose .sc{color:var(--muted2)}
  .vs{font-family:'DM Mono',monospace;font-size:9px;color:#b3c3b6;letter-spacing:.1em;padding:2px 0 2px 35px}
  .mmeta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:0}
  .mgroup{font-weight:800;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--field);padding:3px 7px;border-radius:6px;white-space:nowrap}
  .mgroup.ko{background:var(--gold-deep)}
  .mvenue{font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted);line-height:1.18;max-width:108px;text-align:right}
  .mcity{font-weight:600;color:var(--ink)}

  footer{text-align:center;padding:30px 16px 8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;line-height:1.7}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-family:'Archivo Narrow',sans-serif}
  .empty .big{font-size:34px;margin-bottom:8px}

  /* tables */
  .sec-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:9px;margin:18px 0 14px}
  .sec-title{font-family:'Archivo',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase;letter-spacing:-.01em}
  .sec-note{font-family:'Archivo Narrow',sans-serif;font-size:12px;color:var(--muted)}
  .legend{display:flex;gap:14px;font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  .sw{width:9px;height:9px;border-radius:2px;display:inline-block}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr));gap:12px}
  .tcard{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:12px 12px 10px}
  .tcard h3{font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin-bottom:8px}
  .tcol{display:grid;grid-template-columns:20px 1fr 22px 52px 32px 26px;align-items:center;gap:6px}
  .tcol.h{padding:0 4px 6px 8px;font-family:'Archivo Narrow',sans-serif;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line3);margin-bottom:5px}
  .trow{padding:7px 4px 7px 8px;border-left:3px solid transparent;border-radius:0 6px 6px 0;font-size:12px;margin-bottom:2px}
  .trow .tm{display:flex;align-items:center;gap:7px;min-width:0;font-weight:700}
  .trow .tm em{font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cell{font-family:'DM Mono',monospace;text-align:center;color:var(--muted2);font-size:11px}
  .cell.gd{color:var(--muted)}
  .cell.pts{font-size:13px;font-weight:600;color:var(--ink)}
  .q1{border-left-color:var(--field);background:var(--tintg)}
  .q2{border-left-color:var(--gold-deep);background:var(--tinty)}
  .q3{border-left-color:#c2554e;background:var(--shade)}
  .pos{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;text-align:center}
  .pos.p1{color:var(--field)}.pos.p2{color:var(--gold-deep)}.pos.p3{color:#c2554e}
  .flag-sm{width:20px;height:13px;object-fit:cover;border-radius:2px;border:1px solid rgba(10,31,20,.1);flex:0 0 auto}

  .thirds{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:12px 12px 14px;max-width:560px}
  .th-h{display:grid;grid-template-columns:22px 30px 24px 1fr 30px 30px;align-items:center;gap:8px;padding:0 8px 7px;font-family:'Archivo Narrow',sans-serif;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line3)}
  .trow3{display:grid;grid-template-columns:22px 30px 24px 1fr 30px 30px;align-items:center;gap:8px;padding:8px;border-radius:7px;font-size:13px}
  .trow3.in{background:var(--tintg)}
  .trow3 .nmm{font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cut{display:flex;align-items:center;gap:9px;margin:8px 2px;font-family:'Archivo',sans-serif;font-weight:800;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#c2554e}
  .cut .ln{flex:1;height:1px;background:#eaddda}

  /* modal */
  .backdrop{position:fixed;inset:0;z-index:60;background:rgba(6,28,17,.55);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:clamp(0px,4vh,40px) clamp(0px,3vw,24px)}
  .modal{position:relative;background:var(--paper);width:100%;max-width:800px;border-radius:16px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.45);animation:wcup .22s ease}
  .m-head{background:linear-gradient(160deg,var(--field),var(--field-deep));color:#f4f7f2;padding:clamp(15px,3vw,22px) clamp(16px,3.5vw,30px) clamp(18px,3vw,24px);position:relative}
  .m-head::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 42px,rgba(255,255,255,.04) 42px 84px);pointer-events:none}
  .m-topbar{display:flex;align-items:center;justify-content:space-between;position:relative}
  .m-round{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .m-close{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:14px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .m-close:hover{background:rgba(255,255,255,.18)}
  .m-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:clamp(6px,2vw,18px);margin-top:14px;position:relative}
  .m-team{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
  .m-flag{width:54px;height:36px;object-fit:cover;border-radius:5px;border:1px solid rgba(255,255,255,.3)}
  .m-flag.ph{border:1px dashed rgba(255,255,255,.4)}
  .m-team .tn{font-weight:800;font-size:clamp(14px,2vw,18px);line-height:1.12}
  .m-rank{font-family:'DM Mono',monospace;font-size:10px;color:#bcd6c3}
  .m-center{text-align:center;min-width:80px}
  .m-score{font-family:'DM Mono',monospace;font-weight:600;font-size:clamp(28px,6vw,44px);line-height:1;letter-spacing:-.02em}
  .m-time{font-family:'DM Mono',monospace;font-weight:600;font-size:clamp(22px,4vw,30px);line-height:1}
  .m-tmeta{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-top:4px}
  .m-badge{display:inline-block;margin-top:8px;font-family:'Archivo',sans-serif;font-weight:800;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:5px}
  .m-badge.live{background:var(--live);color:#fff;animation:pulse 1.4s infinite}
  .m-badge.ft{background:rgba(255,255,255,.16);color:var(--chalk)}
  .m-badge.up{background:rgba(245,197,66,.18);color:var(--gold)}
  .subline{text-align:center;margin-top:14px;font-family:'Archivo Narrow',sans-serif;font-size:12.5px;color:#cfe3d4;position:relative}
  .m-body{padding:clamp(12px,3vw,20px) clamp(13px,3.5vw,28px) clamp(20px,3vw,28px)}
  .panel{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:14px 15px;margin-top:12px}
  .panel.ko{background:var(--kobg);border-color:var(--koline);text-align:center}
  .panel-t{font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--field);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .panel.ko .panel-t{color:#9a6f08;justify-content:center}
  .tag{font-family:'Archivo Narrow',sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.02em;text-transform:none;color:var(--faint);background:var(--tint);padding:2px 7px;border-radius:4px}
  .prob{display:flex;height:34px;border-radius:8px;overflow:hidden;font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;color:#fff}
  .prob>div{display:flex;align-items:center;justify-content:center}
  .prob .ph{background:var(--field)}.prob .pd{background:#b9c6bc;color:#33433a}.prob .pa{background:var(--gold-deep)}
  .prob-l{display:flex;margin-top:7px;font-family:'Archivo Narrow',sans-serif;font-size:11.5px;color:var(--muted)}
  .prob-l span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
  .formrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .formrow:last-child{margin-bottom:0}
  .formrow .fn{flex:1;font-weight:700;font-size:13px;min-width:0}
  .pills{display:flex;gap:4px}
  .pill{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:10px;color:#fff}
  .pill.W{background:var(--field)}.pill.D{background:#b9c6bc;color:#33433a}.pill.L{background:var(--live)}
  .h2h{display:flex;align-items:center;text-align:center}
  .h2h>div{flex:1}
  .h2h .big{font-family:'DM Mono',monospace;font-weight:600;font-size:26px}
  .h2h .big.g{color:var(--field)}.h2h .big.n{color:var(--faint)}.h2h .big.a{color:var(--gold-deep)}
  .h2h .sm{font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted);margin-top:2px}
  .h2h-last{text-align:center;margin-top:11px;font-family:'Archivo Narrow',sans-serif;font-size:11.5px;color:var(--muted2);border-top:1px solid var(--line3);padding-top:9px}
  .two{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
  .tt{font-weight:800;font-size:12px;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .tt img{width:18px;height:12px;object-fit:cover;border-radius:2px}
  .pl{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--tint)}
  .av{width:32px;height:32px;border-radius:50%;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .av.h{background:var(--field)}.av.a{background:var(--gold-deep)}
  .pl .pinfo{flex:1;min-width:0}
  .pl .pn{font-weight:700;font-size:13px;line-height:1.15}
  .pl .pm{font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted2)}
  .pl .ptag{font-family:'Archivo Narrow',sans-serif;font-size:10px;padding:3px 7px;border-radius:5px;text-align:right;max-width:96px}
  .ptag.h{color:var(--field);background:var(--tintg)}.ptag.a{color:#9a6f08;background:var(--tinty)}
  .shape-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .shape-h .fm{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:#fff;padding:2px 7px;border-radius:5px}
  .fm.h{background:var(--field)}.fm.a{background:var(--gold-deep)}
  .pitch{display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(180deg,#0e6b3d,#0a5230);border-radius:9px;padding:11px 8px;height:168px}
  .pitch .ln{display:flex;justify-content:center;gap:9px;flex:1;align-items:center}
  .spot{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--gold);box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .coach{font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted2);margin-top:8px}
  .statrow{margin-bottom:11px}
  .statrow .sh{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:12.5px;margin-bottom:5px;font-weight:600;color:var(--ink)}
  .statrow .sl{font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
  .bar{display:flex;align-items:center;gap:4px;height:7px}
  .bar>div{flex:1;display:flex}
  .bar .lh{justify-content:flex-end}

const CANON2TEAM={}; Object.keys(ISO).forEach(t=>CANON2TEAM[canon(t)]=t);

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function key(m){return m.h+"|"+m.a;}
function startDate(m){const ov=LIVE[key(m)];if(ov&&ov.kickoff)return new Date(ov.kickoff);const a=m.d.split("-").map(Number);return new Date(Date.UTC(a[0],a[1]-1,a[2],m.t+4,(m.t%1)*60));}
function fmtTime(dt){const l=new Date(dt.getTime()+tzMinFor(dt)*60000);let h=l.getUTCHours(),mm=l.getUTCMinutes();const ap=h<12?"AM":"PM";let h12=h%12;if(h12===0)h12=12;return h12+":"+String(mm).padStart(2,"0")+" "+ap;}
function localParts(dt){const l=new Date(dt.getTime()+tzMinFor(dt)*60000);return {dkey:l.getUTCFullYear()+"-"+String(l.getUTCMonth()+1).padStart(2,"0")+"-"+String(l.getUTCDate()).padStart(2,"0"),dow:l.getUTCDay(),dd:l.getUTCDate(),mo:l.getUTCMonth()};}
function flagCode(n){const c=ISO[n];if(!c)return null;if(c==="_ENG")return "gb-eng";if(c==="_SCO")return "gb-sct";return c.toLowerCase();}
function flagUrl(n){const c=flagCode(n);return c?("https://flagcdn.com/"+c+".svg"):null;}
function flagTag(n,cls){const u=flagUrl(n);if(!u)return '<span class="'+cls+' ph"></span>';const code=((ISO[n]||"").replace(/^_/,"")||"?").slice(0,3).toUpperCase();return '<img class="'+cls+'" loading="lazy" src="'+u+'" alt="" onerror="flagFail(this,\''+code+'\',\''+cls+'\')">';}

function stateOf(m){
 const ov=LIVE[key(m)];
 if(ov)return {st:ov.status,hs:ov.hs,as:ov.as,detail:ov.detail};
 if(m.ko)return {st:"up"};
 const now=new Date(),start=startDate(m),end=new Date(start.getTime()+115*60000);
 const hasScore=(m.hs!==undefined&&m.as!==undefined);
 if(now<start)return {st:"up",hs:m.hs,as:m.as};
 if(now>=end)return {st:hasScore?"final":"ended",hs:m.hs,as:m.as};
 return {st:hasScore?"final":"live",hs:m.hs,as:m.as};
}

function strengthOf(n){const t=TEAMS[n];const r=(t&&t.rank)?t.rank:60;return Math.max(22,Math.min(100,118-r));}
function winProb(h,a){const sH=strengthOf(h),sA=strengthOf(a);let dr=Math.round(28-Math.abs(sH-sA)*0.22);dr=Math.max(16,Math.min(30,dr));const rem=100-dr;const pH=Math.round(rem*sH/(sH+sA));return {h:pH,d:dr,a:rem-pH};}
function initials(n){const p=String(n).replace(/[^A-Za-z\u00C0-\u017F ]/g,"").trim().split(/\s+/);return (((p[0]||" ")[0])+((p[p.length-1]||" ")[0])).toUpperCase();}
function formationLines(f){const parts=String(f).split("-").map(Number).filter(x=>x>0);return parts.slice().reverse().concat([1]);}
function canon(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");}
function toTeam(e){const k=canon(e);return ALIAS[k]||CANON2TEAM[k]||e;}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function decodeSlot(code){
 if(/^W\s/.test(code))return "Winner "+code.slice(2);
 if(/^L\s/.test(code))return "Loser "+code.slice(2);
 if(/^W\d+$/.test(code))return "Winner Match "+code.slice(1);
 if(/^3rd /.test(code))return "Best 3rd \u00b7 "+code.slice(4);
 if(/^[12][A-L]$/.test(code))return (code[0]==="1"?"Winner Grp ":"Runner-up Grp ")+code[1];
 return code;
}
function slotInfoHTML(code){

 if(mm){ const pos=+mm[1], g=mm[2], rows=computeGroup(g), complete=rows.every(t=>t.pld===3), occ=(rows[pos-1]||{}).n;
  let h='<div class="slottitle">Group '+g+' \u2014 '+(complete?'<b>'+esc(occ||"TBD")+'</b> confirmed':(rows.some(t=>t.pld>0)?'currently <b>'+esc(occ||"TBD")+'</b>':'not started'))+'</div>';
  rows.forEach((t,i)=>{ h+='<div class="srow'+(i===pos-1?' tgt':'')+'"><span class="spos '+(i<2?"p1":i===2?"p2":"")+'">'+(i+1)+'</span>'+flagTag(t.n,"flag-sm")+'<span class="snm">'+esc(t.n)+'</span><span class="cell">'+t.pld+'</span><span class="cell pts">'+t.pts+'</span></div>'; });
  return h;
 }
 mm=code.match(/^3rd (.+)$/);
 if(mm){ const gs=mm[1].split("/"); const proj=computeThirdProj()[code]; const qSet=new Set(bestThirds().slice(0,8).map(x=>x.g));
  let h='<div class="slottitle">Best 3rd from '+esc(gs.join(", "))+(proj?' \u2014 likely <b>'+esc(proj.n)+'</b>':'')+'</div>';
  gs.forEach(g=>{ const t=computeGroup(g)[2]; if(!t)return; const isP=proj&&proj.g===g, q=qSet.has(g);
   h+='<div class="srow'+(isP?' tgt':'')+'"><span class="spos '+(q?'p1':'p2')+'">'+g+'</span>'+flagTag(t.n,"flag-sm")+'<span class="snm">'+esc(t.n)+(isP?' <span class="projpill">most likely</span>':'')+'</span><span class="cell">'+t.pld+'</span><span class="cell pts">'+t.pts+'</span></div>'; });
  return h+'<div class="slotnote">8 of 12 third-placed teams reach the Round of 32 \u00b7 projection from current standings.</div>';
 }
 mm=code.match(/^W(\d+)$/);
 if(mm){ const fm=M.find(x=>x.slot==="Match "+mm[1]); if(fm)return '<div class="slottitle">Winner of'+(slotTeam(code)?' \u2014 likely <b>'+esc(slotTeam(code).name)+'</b>':'')+'</div><button type="button" class="slotlink" data-jump="'+esc(key(fm))+'"><b>'+esc(slotLabel(fm.h))+'</b> vs <b>'+esc(slotLabel(fm.a))+'</b><span class="jh">drill in \u203a</span></button>'; }
 mm=code.match(/^([WL]) (QF|SF)(\d)$/);
 if(mm){ const mp={QF:"Quarterfinal ",SF:"Semifinal "}; const fm=M.find(x=>x.slot===mp[mm[2]]+mm[3]); if(fm)return '<div class="slottitle">'+(mm[1]==="W"?"Winner":"Loser")+' of'+(slotTeam(code)?' \u2014 likely <b>'+esc(slotTeam(code).name)+'</b>':'')+'</div><button type="button" class="slotlink" data-jump="'+esc(key(fm))+'"><b>'+esc(slotLabel(fm.h))+'</b> vs <b>'+esc(slotLabel(fm.a))+'</b><span class="jh">drill in \u203a</span></button>'; }
 return null;
}
function roundLabel(m){
 if(!m.ko)return "Group "+m.g+" \u00b7 Group stage";
 const map={R32:"Round of 32",R16:"Round of 16",QF:"Quarter-final",SF:"Semi-final","3rd":"Third-place play-off",FINAL:"Final"};
 return (map[m.g]||"Knockout")+(m.slot?" \u00b7 "+m.slot:"");
}
function countdown(dt){const ms=dt.getTime()-Date.now();if(ms<=0)return "";const mins=Math.floor(ms/60000),d=Math.floor(mins/1440),h=Math.floor((mins%1440)/60),mm=mins%60;if(d>0)return "in "+d+"d "+h+"h";if(h>0)return "in "+h+"h "+mm+"m";return "in "+mm+"m";}
function h2hOf(home,away){const r=H2H[[home,away].sort().join("|")];if(!r)return null;return {homeWins:(home===r.a?r.aw:r.bw),draws:r.d,awayWins:(away===r.a?r.aw:r.bw),last:r.last};}

function computeGroup(group){
 const ms=M.filter(x=>x.g===group&&!x.ko);
 const tbl={};const ens=n=>tbl[n]||(tbl[n]={n,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
 ms.forEach(x=>{ens(x.h);ens(x.a);});
 ms.forEach(x=>{const st=stateOf(x),hs=st.hs,as=st.as;if((st.st==="final"||st.st==="ended"||st.st==="live")&&hs!=null&&as!=null){const H=ens(x.h),A=ens(x.a);H.pld++;A.pld++;H.gf+=hs;H.ga+=as;A.gf+=as;A.ga+=hs;if(hs>as){H.w++;A.l++;H.pts+=3;}else if(as>hs){A.w++;H.l++;A.pts+=3;}else{H.d++;A.d++;H.pts++;A.pts++;}}});
 return Object.values(tbl).map(t=>({...t,gd:t.gf-t.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||h2hPair(group,a.n,b.n)||a.n.localeCompare(b.n));
}
function bestThirds(){
 return "ABCDEFGHIJKL".split("").map(g=>{const t=computeGroup(g)[2];return t?{...t,g}:null;}).filter(Boolean)
  .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.n.localeCompare(b.n));
}
/* Project which 3rd-placed team most likely fills each open knockout slot.
   Top 8 thirds qualify (by current standings); assign them to the slots'
   candidate-group sets via bipartite matching so no team appears twice. */
function _thirdSlotCodes(){return M.filter(m=>m.ko&&/^3rd /.test(m.a)).map(m=>m.a);}
let _projCache=null;
function computeThirdProj(){
 if(_projCache)return _projCache;
 const thirds=bestThirds();
 const rankByG={}; thirds.slice(0,8).forEach((t,i)=>{rankByG[t.g]={n:t.n,g:t.g,rank:i+1};});
 const slots=_thirdSlotCodes();
 const cand=slots.map(code=>code.slice(4).split("/").filter(g=>rankByG[g]));
 const groupToSlot={};
 function aug(si,seen){
  for(const g of cand[si]){ if(seen[g])continue; seen[g]=true;
   if(groupToSlot[g]===undefined||aug(groupToSlot[g],seen)){groupToSlot[g]=si;return true;} }
  return false;
 }
 for(let si=0;si<slots.length;si++)aug(si,{});
 const out={}; for(const g in groupToSlot)out[slots[groupToSlot[g]]]=rankByG[g];
 _projCache=out; return out;
}
let _slotCache=null;
function slotTeam(code){
 if(_slotCache&&(code in _slotCache))return _slotCache[code];
 const r=_slotTeamRaw(code);
 if(_slotCache)_slotCache[code]=r;
 return r;
}
function _slotTeamRaw(code){
 let mm=code.match(/^([12])([A-L])$/);
 if(mm){ const rows=computeGroup(mm[2]); if(!rows.length||!rows.some(t=>t.pld>0))return null;
  const t=rows[mm[1]==="1"?0:1]; if(!t)return null;
  return {name:t.n,group:mm[2],proj:!rows.every(x=>x.pld===3)}; }
 if(/^3rd /.test(code)){ const p=computeThirdProj()[code]; return p?{name:p.n,group:p.g,proj:true,rank:p.rank,sub:code.slice(4)}:null; }
 mm=code.match(/^W(\d+)$/);
 if(mm)return matchSideTeam("Match "+mm[1],"W");
 mm=code.match(/^([WL]) (QF|SF)(\d)$/);
 if(mm){ const mp={QF:"Quarterfinal ",SF:"Semifinal "}; return matchSideTeam(mp[mm[2]]+mm[3],mm[1]); }
 return null;
}
function matchSideTeam(slotName,side){
 const fm=M.find(x=>x.slot===slotName); if(!fm)return null;
 const H=slotTeam(fm.h),A=slotTeam(fm.a); if(!H||!A)return null;
 const strong=strengthOf(H.name)>=strengthOf(A.name)?H:A, weak=strong===H?A:H;
 const pick=side==="W"?strong:weak;
 return {name:pick.name,group:pick.group,proj:true};
}
function slotLabel(code){ const r=slotTeam(code); return r?(r.name+(r.proj?" \u00b7 proj":"")):decodeSlot(code); }

  +'<div class="mmeta">'+gtag+'<div class="mvenue"><span class="mcity">'+esc(m.c)+'</span><br>'+esc(m.v)+'</div></div></div>';
}

 thirds.slice(0,8).forEach((t,i)=>{h+=row3(t,i);});

 return h;

function render(){
 _projCache=null;
 _slotCache={};
 buildChips();
 const list=document.getElementById("list");
 const todayP=localParts(new Date());
 if(FILTER==="TABLE"){list.innerHTML=tablesHTML();updateStats();return;}
 if(FILTER==="BRACKET"){list.innerHTML=bracketHTML();updateStats();return;}
 const pls=n=>((TEAMS[n]&&TEAMS[n].players)||[]).map(p=>p.n).join(" ");
 let data=M.filter(m=>{
  if(FILTER==="GROUP"&&m.ko)return false;
  if(FILTER==="FOLLOW"&&!(FOLLOW.has(m.h)||FOLLOW.has(m.a)))return false;
  if(["R32","R16","QF","SF","FINAL"].includes(FILTER)&&m.g!==FILTER)return false;
  if(FILTER==="TODAY"){const p=localParts(startDate(m));if(!(p.dd===todayP.dd&&p.mo===todayP.mo))return false;}

  return true;
 });

 data.forEach(m=>{const p=localParts(startDate(m));(days[p.dkey]=days[p.dkey]||[]).push(m);});

function matchStatsHTML(m,hs,as,live){
 const r=mulberry(hashStr(m.h+m.a+m.d));
 const sH=strengthOf(m.h),sA=strengthOf(m.a);
 let pos=Math.round(50+(sH-sA)*0.22+(r()*8-4));pos=Math.max(35,Math.min(65,pos));
 const gH=hs||0,gA=as||0;
 const shH=Math.max(gH*2+3,Math.round(8+r()*10+(pos-50)*0.2));
 const shA=Math.max(gA*2+3,Math.round(8+r()*10+(50-pos)*0.2));
 const sotH=Math.max(gH,Math.round(shH*(0.32+r()*0.12))),sotA=Math.max(gA,Math.round(shA*(0.32+r()*0.12)));
 const xgH=(Math.max(gH*0.7,gH?gH-0.3+r()*0.8:0.4+r()*1.4)).toFixed(1);
 const xgA=(Math.max(gA*0.7,gA?gA-0.3+r()*0.8:0.4+r()*1.4)).toFixed(1);
 const rows=[["Possession",pos+"%",(100-pos)+"%",pos,100-pos],["Shots",shH,shA,shH,shA],["Shots on target",sotH,sotA,sotH,sotA],["Expected goals (xG)",xgH,xgA,parseFloat(xgH),parseFloat(xgA)],["Corners",Math.round(3+r()*7),Math.round(3+r()*7),0,0],["Fouls",Math.round(7+r()*8),Math.round(7+r()*8),0,0]];

 evs.forEach(e=>{ const cell='<span class="evcell '+e.side+'">'+(e.side==="h"?evMarker(e.kind)+'<span class="evlbl">'+e.label+'</span>':'<span class="evlbl">'+e.label+'</span>'+evMarker(e.kind))+'</span>';
  h+='<div class="evrow">'+(e.side==="h"?cell:'<span></span>')+'<span class="evmin">'+esc(e.min)+'</span>'+(e.side==="a"?cell:'<span></span>')+'</div>'; });
 return h+'</div></div>';
}
async function hydrateLive(m){
 const eid=EVID[key(m)]; if(!eid)return;
 const sum=await getSummary(eid); if(!sum||OPEN!==key(m))return;
 const live=sumLive(sum);
 const o=parseOdds(sum,m); if(o){ const el=document.getElementById("probPanel"); if(el)el.innerHTML=probInner(m,{h:o.h,d:o.d,a:o.a},{title:(o.live?"Live win probability":"Market win probability"),tag:o.prov,note:"Implied from live bookmaker odds, margin removed."}); }
 const evs=parseEvents(sum,m); const eslot=document.getElementById("eventsSlot"); if(eslot)eslot.innerHTML=eventsHTML(evs,m,live);
 const st=parseTeamStats(sum,m); const sslot=document.getElementById("statsSlot"); if(sslot&&st){ const html=realStatsHTML(m,st,live); if(html)sslot.innerHTML=html; }
}

/* ============ KIOSK ============ */
let wakeLock=null;
async function keepAwake(){try{if("wakeLock"in navigator)wakeLock=await navigator.wakeLock.request("screen");}catch(_){}}
function toggleFull(){const el=document.documentElement;if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);}else{(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);}}

/* ===== timezone ===== */
const TZOFF={ET:-4,CT:-5,MT:-6,PT:-7,BST:1,CEST:2};
let TZ="ET"; try{const z=localStorage.getItem("wc-tz"); if(z&&(z==="Local"||TZOFF[z]!=null))TZ=z;}catch(e){}
function tzMinFor(dt){ if(TZ==="Local")return -dt.getTimezoneOffset(); return (TZOFF[TZ]||0)*60; }
function tzAbbr(){ return TZ==="Local"?"local":TZ; }
/* ===== follow teams ===== */
let FOLLOW=new Set(); try{FOLLOW=new Set(JSON.parse(localStorage.getItem("wc-follow")||"[]"));}catch(e){}
function toggleFollow(team){ if(FOLLOW.has(team))FOLLOW.delete(team); else FOLLOW.add(team); try{localStorage.setItem("wc-follow",JSON.stringify([...FOLLOW]));}catch(e){} render(); if(OPEN)openDetail(OPEN); }
/* ===== a11y + flags + offline ===== */
let LASTFOCUS=null, OFFLINE=false;
function flagFail(img,code,cls){ img.outerHTML='<span class="'+cls+' code">'+code+'</span>'; }
function announce(msg){ const r=document.getElementById("liveRegion"); if(r)r.textContent=msg; }
/* ===== deep links ===== */
function readHash(){ const h=location.hash.replace(/^#/,""); const o={}; if(h)h.split("&").forEach(p=>{const i=p.indexOf("="); if(i>0)o[p.slice(0,i)]=decodeURIComponent(p.slice(i+1));}); return o; }
function setHash(){ const parts=[]; if(FILTER!=="ALL")parts.push("f="+FILTER); if(OPEN)parts.push("m="+encodeURIComponent(OPEN)); const h=parts.length?("#"+parts.join("&")):(location.pathname+location.search); try{history.replaceState(null,"",h);}catch(e){} }
function applyHash(){ const hp=readHash(); const wantF=hp.f||"ALL"; if(wantF!==FILTER){FILTER=wantF;render();} const wantM=hp.m||null; if(wantM!==OPEN){ if(wantM&&M.find(x=>key(x)===wantM))openDetail(wantM); else if(!wantM&&OPEN)closeDetail(); } }
/* ===== head-to-head tiebreak ===== */
function h2hPair(group,a,b){ const mm=M.find(x=>x.g===group&&!x.ko&&((x.h===a&&x.a===b)||(x.h===b&&x.a===a))); if(!mm)return 0; const st=stateOf(mm); if(st.hs==null||st.as==null)return 0; const ag=(mm.h===a?st.hs:st.as), bg=(mm.h===a?st.as:st.hs); return bg-ag; }
/* ===== calendar (.ics) ===== */
function icsFor(m){ const dt=startDate(m), end=new Date(dt.getTime()+115*60000); const pad=n=>String(n).padStart(2,"0"); const f=d=>d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"+pad(d.getUTCHours())+pad(d.getUTCMinutes())+"00Z"; const tt=(m.ko?decodeSlot(m.h)+" vs "+decodeSlot(m.a):m.h+" vs "+m.a)+" — World Cup 26"; const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//WC26//EN","CALSCALE:GREGORIAN","BEGIN:VEVENT","UID:wc26-"+hashStr(key(m))+"@local","DTSTAMP:"+f(new Date()),"DTSTART:"+f(dt),"DTEND:"+f(end),"SUMMARY:"+tt,"LOCATION:"+(m.v+", "+m.c),"DESCRIPTION:"+roundLabel(m),"END:VEVENT","END:VCALENDAR"].join("\r\n"); const blob=new Blob([ics],{type:"text/calendar"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="wc26-"+(canon(m.ko?m.slot:m.h)||"match")+".ics"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000); }
/* ===== knockout bracket ===== */
function bracketHTML(){ const rounds=[["R32","Round of 32"],["R16","Round of 16"],["QF","Quarter-finals"],["SF","Semi-finals"],["FINAL","Final"]]; let h='<div class="sec-head"><div class="sec-title">Knockout bracket</div><div class="sec-note">Tap a tie for its match center \u00b7 teams fill in as groups finish</div></div><div class="bracket">'; rounds.forEach(([g,lab])=>{ const ms=M.filter(x=>x.g===g); h+='<div class="bcol"><h4>'+lab+'</h4><div class="bties">'+ms.map(m=>{ const p=localParts(startDate(m)); return '<div class="btie" role="button" tabindex="0" data-key="'+esc(key(m))+'"><div class="bmeta">'+esc(m.slot)+' \u00b7 '+MON[p.mo]+' '+p.dd+'</div><div class="bt"><span>'+esc(slotLabel(m.h))+'</span></div><div class="bt"><span>'+esc(slotLabel(m.a))+'</span></div></div>'; }).join("")+'</div></div>'; }); h+='</div>'; const tp=M.find(x=>x.g==="3rd"); if(tp){const p=localParts(startDate(tp)); h+='<div style="margin-top:8px"><div class="btie" role="button" tabindex="0" data-key="'+esc(key(tp))+'" style="max-width:240px"><div class="bmeta">Third place \u00b7 '+MON[p.mo]+' '+p.dd+'</div><div class="bt"><span>'+esc(slotLabel(tp.h))+'</span></div><div class="bt"><span>'+esc(slotLabel(tp.a))+'</span></div></div></div>';} return h; }
function trapTab(e){ if(e.key!=="Tab")return; const bd=document.getElementById("backdrop"); if(!bd)return; const f=[...bd.querySelectorAll('button,select,a[href],[tabindex]:not([tabindex="-1"])')].filter(x=>x.offsetParent!==null); if(!f.length)return; const first=f[0],last=f[f.length-1]; if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();} else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();} }

/* ============ EVENTS + INIT ============ */
document.getElementById("chips").addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b)return;FILTER=b.dataset.k;render();setHash();window.scrollTo({top:0});});
document.getElementById("list").addEventListener("click",e=>{const card=e.target.closest(".match")||e.target.closest(".btie");if(card)openDetail(card.dataset.key);});
document.getElementById("list").addEventListener("keydown",e=>{if(e.key!=="Enter"&&e.key!==" ")return;const card=e.target.closest&&(e.target.closest(".match")||e.target.closest(".btie"));if(card){e.preventDefault();openDetail(card.dataset.key);}});
window.addEventListener("hashchange",applyHash);
(function(){const tzSel=document.getElementById("tz");if(tzSel){tzSel.value=TZ;tzSel.addEventListener("change",()=>{TZ=tzSel.value;try{localStorage.setItem("wc-tz",TZ);}catch(e){}render();if(OPEN)openDetail(OPEN);});}})();
document.getElementById("search").addEventListener("input",e=>{Q=e.target.value.trim().toLowerCase();render();});
document.getElementById("refreshBtn").addEventListener("click",()=>refreshLive(true));
document.getElementById("fullBtn").addEventListener("click",toggleFull);
const themeBtn=document.getElementById("themeBtn");
function applyTheme(d){document.documentElement.classList.toggle("dark",d);themeBtn.textContent=d?"Light":"Dark";}
let DARK=false;try{DARK=localStorage.getItem("wc-theme")==="dark";}catch(e){}applyTheme(DARK);
themeBtn.addEventListener("click",()=>{DARK=!DARK;try{localStorage.setItem("wc-theme",DARK?"dark":"light");}catch(e){}applyTheme(DARK);});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&OPEN)closeDetail();});
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){keepAwake();refreshLive(false);}});

try{
 {const hp=readHash();if(hp.f)FILTER=hp.f;} buildChips();render(); {const hp=readHash();if(hp.m&&M.find(x=>key(x)===hp.m))openDetail(hp.m);}
 setInterval(()=>{render();if(OPEN)openDetail(OPEN);},30000);
 refreshLive(false).then(backfillIds);setInterval(()=>refreshLive(false),60000);
 keepAwake();
}catch(err){document.getElementById("list").innerHTML='<div class="empty"><div class="big">!</div>Something went wrong.<br>'+(err&&err.message||"")+'</div>';}
